<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gains Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>FJ SD Tracker</h1>
            <p>Journey from FJai to VJai.</p>
        </header>

        <section class="workout-selector">
            <label for="workout-plan"><strong>Today's Routine:</strong></label>
            <select id="workout-plan">
                <option value="">-- Select Workout --</option>
                <option value="A">Workout A: Push & Drive</option>
                <option value="B">Workout B: Postural Pull</option>
                <option value="C">Workout C: Structural Stability</option>
            </select>
        </section>

        <main id="workout-display">
            </main>

        <button id="save-btn" style="display: none;">Log Workout</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
